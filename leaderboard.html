<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Guessing Game Scoreboard – High Scores | Cinemystry</title>
    <meta name="description"
        content="See the top scores from the Cinemystry movie guessing game. Filter by difficulty level and compare your results. Can you reach the top?" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="leaderboard.css" />
</head>

<body>
    <!-- ── Navbar ── -->
    <nav class="navbar" id="navbar">
        <div class="navbar__container">
            <a href="index.html" class="navbar__logo">Cinemystry</a>
            <ul class="navbar__links">
                <li><a href="index.html" class="navbar__link">Home</a></li>
                <li><a href="how-to-play.html" class="navbar__link">How To Play</a></li>
                <li><a href="multiplayer.html" class="navbar__link">Multiplayer</a></li>
                <li><a href="game.html" class="navbar__link navbar__link--cta">Play Now</a></li>
            </ul>
            <button class="navbar__burger" id="navBurger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="navbar__mobile" id="navMobile">
            <a href="how-to-play.html" class="navbar__mobile-link">How To Play</a>
            <a href="index.html" class="navbar__mobile-link">Home</a>
            <a href="multiplayer.html" class="navbar__mobile-link">Multiplayer</a>
            <a href="game.html" class="navbar__mobile-link" style="color:var(--red);font-weight:700">▶ Play Now</a>
        </div>
    </nav>

    <main class="lb-main">
        <!-- ── Hero ── -->
        <div class="lb-hero">
            <div class="container">
                <div class="lb-hero__eyebrow">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;vertical-align:middle;margin-right:6px"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V18H9v2h6v-2h-2v-2.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
                    Local Records
                </div>
                <h1 class="lb-hero__title">Scoreboard</h1>
                <p class="lb-hero__sub">Best scores from all players on this device.</p>
                <div class="lb-hero__actions">
                    <a href="game.html" class="btn btn--primary">▶ Play Now</a>
                    <button class="btn btn--danger" id="clearBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        Clear All Scores
                    </button>
                </div>
            </div>
        </div>

        <div class="container">
            <!-- ── Controls ── -->
            <div class="lb-controls">
                <div class="lb-filters">
                    <button class="lb-filter lb-filter--active" data-filter="all">All</button>
                    <button class="lb-filter" data-filter="easy">Easy</button>
                    <button class="lb-filter" data-filter="medium">Medium</button>
                    <button class="lb-filter" data-filter="hard">Hard</button>
                </div>
            </div>

            <!-- ── Table ── -->
            <div class="lb-table-wrap">
                <table class="lb-table" aria-label="Scoreboard scores">
                    <thead>
                        <tr>
                            <th class="lb-th">Player</th>
                            <th class="lb-th">Score</th>
                            <th class="lb-th">Streak</th>
                            <th class="lb-th">Difficulty</th>
                            <th class="lb-th">Date</th>
                        </tr>
                    </thead>
                    <tbody id="lbBody"></tbody>
                </table>
                <div class="lb-empty" id="lbEmpty">
                    <div class="lb-empty__icon">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="width:40px;height:40px"><path d="M18 3v2h-2V3H8v2H6V3H4v18h2v-2h2v2h8v-2h2v2h2V3h-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm0-4H6V7h2v2zm10 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
                    </div>
                    <div class="lb-empty__title">No scores yet</div>
                    <p>Play a game and be the first on the scoreboard!</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script>
        const DIFF_CLASSES = { easy: 'lb-diff--easy', medium: 'lb-diff--medium', hard: 'lb-diff--hard' };
        let currentFilter = 'all';

        function render() {
            let board = GameStorage.getLeaderboard();
            if (currentFilter !== 'all') board = board.filter(e => e.difficulty === currentFilter);

            const body = document.getElementById('lbBody');
            const empty = document.getElementById('lbEmpty');
            body.innerHTML = '';

            if (!board.length) { empty.style.display = 'flex'; return; }
            empty.style.display = 'none';

            board.slice(0, 50).forEach((e, i) => {
                const rowClass = 'lb-row';
                const diffClass = DIFF_CLASSES[e.difficulty] || '';
                const streakHtml = (e.streak || 0) > 0
                    ? `<span class="lb-streak-badge"><svg viewBox="0 0 24 24" fill="currentColor" style="width:11px;height:11px;vertical-align:middle;margin-right:3px"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg>${e.streak}</span>`
                    : `<span style="color:var(--text-dim)">—</span>`;
                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.style.animationDelay = `${i * 0.03}s`;
                tr.innerHTML = `
                    <td class="lb-td lb-td--name">${e.name || 'Player'}</td>
                    <td class="lb-td lb-td--score">${(e.score || 0).toLocaleString()}</td>
                    <td class="lb-td">${streakHtml}</td>
                    <td class="lb-td"><span class="lb-diff ${diffClass}">${e.difficulty || '—'}</span></td>
                    <td class="lb-td lb-td--date" style="color:var(--text-muted);font-size:0.75rem">${e.date || '—'}</td>
                `;
                body.appendChild(tr);
            });
        }

        document.querySelectorAll('.lb-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lb-filter').forEach(b => b.classList.remove('lb-filter--active'));
                btn.classList.add('lb-filter--active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear all scoreboard scores? This cannot be undone.')) {
                GameStorage.clearLeaderboard();
                render();
            }
        });

        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('navbar--scrolled', window.scrollY > 40);
        }, { passive: true });

        const burger = document.getElementById('navBurger');
        const mobileNav = document.getElementById('navMobile');
        burger.addEventListener('click', () => {
            mobileNav.classList.toggle('navbar__mobile--open');
            burger.classList.toggle('navbar__burger--open');
        });

        mobileNav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            mobileNav.classList.remove('navbar__mobile--open');
            burger.classList.remove('navbar__burger--open');
        }));

        render();
    </script>
</body>

</html>
